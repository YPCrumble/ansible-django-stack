---

- name: Add deadsnakes team New Python Versions PPA to the apt sources list
  ansible.builtin.apt_repository: repo='ppa:deadsnakes/ppa'
                  update_cache={{ update_apt_cache }}
                  state=present
  when: enable_deadsnakes_ppa

- name: "Add node 10 (LTS) to the apt sources list."
  shell: curl -sL https://deb.nodesource.com/setup_10.x | sudo -E bash -
  tags: molecule-idempotence-notest

- name: "Update or add the sentry-cli package."
  shell: sentry-cli update || curl -sL https://sentry.io/get-cli/ | bash
  tags:
    - deploy
    - molecule-idempotence-notest

- name: Install additional packages
  ansible.builtin.apt:
    update_cache: "{{ update_apt_cache }}"
    state: present
    name:
      - libcurl4-gnutls-dev
      - gnutls-dev
      - libpq-dev
      - "{{ virtualenv_python_version + '-dev' }}"
      - "{{ virtualenv_python_version + '-distutils' }}"  # Required by Ubuntu 22.04
      - nodejs
      - silversearcher-ag
      - vim
      - autopostgresqlbackup
      # This package is required for Ubuntu 16.04
      - python3.9-distutils

- name: Check whether /usr/bin/node exists
  stat:
    path: /usr/bin/node
  register: usr_bin_node_exists

- name: Symlink nodejs to `node`
  file: src=/usr/bin/nodejs dest=/usr/bin/node state=link
  when: usr_bin_node_exists.stat.exists == False

- name: Add an Apt signing key, uses whichever key is at the URL
  apt_key:
    url: https://dl.yarnpkg.com/debian/pubkey.gpg
    state: present

- name: Add the Yarn repository to the apt sources list
  apt_repository: repo='deb https://dl.yarnpkg.com/debian/ stable main'
                  update_cache={{ update_apt_cache }}
                  state=present

- name: Make sure latest yarn is installed
  apt:
    name: yarn
    state: latest
    update_cache: "{{ update_apt_cache }}"

- name: Setup LogDNA
  include_role:
    name: logdna.logdna
  vars:
    conf_key: "{{ logdna_ingestion_key }}"
    conf_logdir: "{{ application_log_dir }}"
    # All other configuration parameter specifications
  when: logdna_ingestion_key is defined and logdna_ingestion_key
