---

project_name: bookclubz
application_name: "{{ project_name }}"
enable_deadsnakes_ppa: true
virtualenv_python_version: python3.9
requirements_file: "{{ project_path }}/requirements/production.txt"


# Git settings.
git_repo: "{{ vault_git_repo }}"
setup_git_repo: true
git_branch: main


# Security settings
sudo_user_password: "{{ vault_sudo_user_password }}"


# Database settings.
db_user: "{{ application_name }}"
db_name: "{{ application_name }}"
db_password: "{{ vault_db_password }}"


# Gunicorn settings.
# For the number of workers, a good rule to follow is
# 2 x number of CPUs + 1
gunicorn_num_workers: 12

# Setting this to 1 will restart the Gunicorn process each time
# you make a request, basically reloading the code. Very handy
# when developing. Set to 0 for unlimited requests (default).
gunicorn_max_requests: 5000
gunicorn_timeout_seconds: 30
gunicorn_max_requests_jitter: 500

# Nginx settings
nginx_cache_static: true
nginx_cache_media: true
nginx_cache_files: true


# RabbitMQ settings.
rabbitmq_server_name: "{{ inventory_hostname }}"

rabbitmq_admin_user: admin
rabbitmq_admin_password: "{{ vault_rabbitmq_admin_password }}"

rabbitmq_application_vhost: "{{ application_name }}"
rabbitmq_application_user: "{{ application_name }}"
rabbitmq_application_password: "{{ vault_rabbitmq_application_password }}"


# Celery settings.
celery_num_workers: 4
use_celery: true
use_flower: true
flower_admin_password: "{{ vault_flower_admin_password }}"


# Application settings.
django_settings_file: "settings.production"
django_secret_key: "{{ vault_django_secret_key }}"

broker_url: "amqp://{{ rabbitmq_application_user }}:{{ rabbitmq_application_password }}@localhost/{{ rabbitmq_application_vhost }}"

run_django_db_migrations: true
run_django_collectstatic: true

run_hourly_jobs: true
run_daily_jobs: true
run_weekly_jobs: false
run_monthly_jobs: true
run_jobs_bash_file: "run_jobs.sh"

logdna_ingestion_key: "{{ vault_logdna_ingestion_key }}"

django_environment_extra:
  AMAZON_SECRET_KEY: "{{ vault_amazon_secret_key }}"
  AMAZON_ACCESS_KEY: "{{ vault_amazon_access_key }}"
  AMAZON_ASSOC_TAG: "{{ vault_amazon_assoc_tag }}"

  SPARKPOST_API_KEY: "{{ vault_sparkpost_api_key }}"

  SENTRY_DSN: "{{ vault_sentry_dsn }}"

  SKIMLINKS_API_KEY: "{{ vault_skimlinks_api_key }}"
  SKIMLINKS_BASE_URL: "{{ vault_skimlinks_base_url }}"
  ANYMAIL_WEBHOOK_SECRET: "{{ vault_anymail_webhook_secret }}"
  CRONOFY_CLIENT_SECRET: "{{ vault_cronofy_client_secret }}"

  STRIPE_PUBLISHABLE_KEY: '{{ vault_stripe_publishable_key }}'
  STRIPE_SECRET_KEY: '{{ vault_stripe_secret_key }}'
  STRIPE_CLIENT_ID: '{{ vault_stripe_client_id }}'
  STRIPE_CSRF_TOKEN: '{{ vault_stripe_csrf_token }}'
  STRIPE_SIGNING_SECRET: '{{ vault_stripe_signing_secret }}'
  STRIPE_PREMIUM_SUBSCRIPTION_SIGNING_SECRET: '{{ vault_stripe_premium_subscription_signing_secret }}'
  SOCIAL_AUTH_GOOGLE_OAUTH2_KEY: 'vault_social_auth_google_oauth2_key'
  SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET: '{{ vault_social_auth_google_oauth2_secret }}'
  RAPIDAPI_URL: '{{ vault_rapidapi_url }}'
  RAPIDAPI_HOST: '{{ vault_rapidapi_host }}'
  RAPIDAPI_KEY: '{{ vault_rapidapi_key }}'
  SOCIAL_AUTH_APPLE_ID_CLIENT: '{{ vault_apple_id_client }}'
  SOCIAL_AUTH_APPLE_ID_TEAM: '{{ vault_apple_id_team }}'
  SOCIAL_AUTH_APPLE_ID_KEY: '{{ vault_apple_id_key }}'
  SOCIAL_AUTH_APPLE_ID_SECRET: '{{ vault_apple_id_secret }}'
  AZURE_SUBSCRIPTION_KEY: '{{ vault_azure_subscription_key }}'
  MODERATION_API_KEY: '{{ vault_moderation_api_key }}'
  LIBRO_BOOK_AUTH: '{{ vault_libro_book_auth }}'
  GOOGLE_PLACES_GEOCODING_API_KEY: '{{ vault_google_places_geocoding_api_key }}'
  TYPESENSE_API_KEY: '{{ vault_typesense_api_key }}'
  TYPESENSE_HOST: '{{ vault_typesense_host }}'
  IMAGE_FROM_HTML_URL: '{{ vault_image_from_html_url }}'
  IMAGE_FROM_HTML_TOKEN: '{{ vault_image_from_html_token }}'
  CALENDAR_API_TOKEN: '{{ vault_calendar_api_token }}'
